version: '3.9'

services:
  deepchecks-redis:
    build: ./
    stdin_open: true
    tty: true
    image: simin/deepchecks_job:v1 
    container_name: deepchecks-redis
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    volumes:
      - ./:/workspace
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 16gb
    working_dir: /workspace/src


