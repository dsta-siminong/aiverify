apiVersion: apps/v1
kind: Deployment
metadata:
  name: shap-redis-deployment
  namespace: aiverify
  labels:
    app.kubernetes.io/name: shap-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: shap-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shap-redis
    spec:
      containers:
        - name: shap-redis
          image: shap_job:v1 
          resources:
            limits:
              cpu: 1000m
              memory: 2048Mi
            requests:
              cpu: 500m
              memory: 1024Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
                drop:
                  ["ALL"]
          imagePullPolicy: IfNotPresent
